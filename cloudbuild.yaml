steps:
  # Build Docker image for PRODUCTION
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lad-frontend-prod:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lad-frontend-prod:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_BACKEND_URL=$_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_ICP_BACKEND_URL=$_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_SOCKET_URL=$_API_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_DISABLE_VAPI=false'
      - '--build-arg'
      - 'NEXT_PUBLIC_WHATSAPP_API_URL=$_WABA_SERVICE_URL'
      - '--build-arg'
      - 'NEXT_PUBLIC_BNI_SERVICE_URL=$_BNI_SERVICE_URL'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/lad-frontend-prod:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/lad-frontend-prod:latest'

  # Deploy to Cloud Run (PRODUCTION)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy $_SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/lad-frontend-prod:$SHORT_SHA \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --min-instances 1 \
          --max-instances 10 \
          --concurrency 80 \
          --timeout 300 \
          --set-env-vars "^@@^NODE_ENV=production@@BRANCH=$BRANCH_NAME@@COMMIT_SHA=$SHORT_SHA@@NEXT_PUBLIC_BACKEND_URL=$_API_URL@@NEXT_PUBLIC_API_URL=$_API_URL@@NEXT_PUBLIC_ICP_BACKEND_URL=$_API_URL@@BACKEND_INTERNAL_URL=$_API_URL@@NEXT_PUBLIC_SOCKET_URL=$_API_URL@@NEXT_PUBLIC_DISABLE_VAPI=false@@NEXT_PUBLIC_WHATSAPP_API_URL=$_WABA_SERVICE_URL@@WABA_SERVICE_URL=$_WABA_SERVICE_URL@@WHATSAPP_SERVICE_URL=$_WABA_SERVICE_URL@@NEXT_PUBLIC_BNI_SERVICE_URL=$_BNI_SERVICE_URL@@BNI_SERVICE_URL=$_BNI_SERVICE_URL"

        echo "✅ Production deployment completed successfully"

images:
  - 'gcr.io/$PROJECT_ID/lad-frontend-prod:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/lad-frontend-prod:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  substitutionOption: 'ALLOW_LOOSE'

timeout: '1800s'

# Substitutions — override these in the Cloud Build trigger configuration
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'lad-frontend-prod'
  _API_URL: 'https://lad-backend-prod-160078175457.us-central1.run.app'
  _WABA_SERVICE_URL: 'https://lad-waba-comms-prod-160078175457.us-central1.run.app'
  _BNI_SERVICE_URL: 'https://lad-waba-comms-prod-160078175457.us-central1.run.app'
