steps:
  # Create lowercase branch name for GCP labels
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "${BRANCH_NAME,,}" > /workspace/branch_lower.txt
        cat /workspace/branch_lower.txt

  # Debug step: Show the values that will be used for build arguments
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Production Build Arguments Debug ==="
        echo "BRANCH_NAME: ${BRANCH_NAME}"
        echo "_API_URL: ${_API_URL}"
        echo "_NEXT_PUBLIC_SOCKET_URL: ${_NEXT_PUBLIC_SOCKET_URL}"
        echo "Environment: PRODUCTION"
        echo "=== End Debug ==="

  # Build the Docker image with buildkit for better caching
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/lad-frontend-production:$COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/lad-frontend-production:$SHORT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/lad-frontend-production:latest',
      '--cache-from', 'gcr.io/$PROJECT_ID/lad-frontend-production:latest',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '--build-arg', 'NEXT_PUBLIC_BACKEND_URL=$_API_URL',
      '--build-arg', 'NEXT_PUBLIC_ICP_BACKEND_URL=$_API_URL',
      '--build-arg', 'NEXT_PUBLIC_SOCKET_URL=$_NEXT_PUBLIC_SOCKET_URL',
      '--build-arg', 'NEXT_PUBLIC_DISABLE_VAPI=false',
      '--build-arg', 'NODE_ENV=production',
      '-f', 'Dockerfile',
      '.'
    ]
    timeout: 900s

  # Push image to registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/$PROJECT_ID/lad-frontend-production:$COMMIT_SHA'
    ]

  # Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/$PROJECT_ID/lad-frontend-production:latest'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lad-frontend-production'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lad-frontend-production:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '2'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '100'
      - '--timeout'
      - '300'
      - '--cpu-boost'

images:
  - 'gcr.io/$PROJECT_ID/lad-frontend-production:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lad-frontend-production:latest'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _API_URL: 'https://lad-backend-production-160078175457.us-central1.run.app'
  _NEXT_PUBLIC_SOCKET_URL: 'wss://lad-frontend-production-160078175457.us-central1.run.app'

tags:
  - 'gcp-cloud-build'
  - 'lad-frontend'
  - 'production'
  - '${BRANCH_NAME,,}'
  - '${SHORT_SHA}'
